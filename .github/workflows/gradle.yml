name: Java CI with Gradle

on:
  push:
    branches: [ "master" ] # Adjust to target your chosen version branch
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: "21" # Use "21" for Minecraft 1.20.5+, or "17" for 1.18-1.20.4
        distribution: "microsoft"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Securely hooks into your settings.gradle plugin setup
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        build-scan-publish: false

    # Compiles the specific mod defined in gradle.properties
    - name: Build Mod
      run: ./gradlew build --stacktrace

    # Dynamically grabs whatever JAR file was created in the build folder
    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Minecraft-Mod
        path: build/libs/*.jar
        
