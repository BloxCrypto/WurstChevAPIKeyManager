name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger the build manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: "21" # Change to "17" if targeting Minecraft 1.18 - 1.20.4
        distribution: "microsoft"

    # Grants runner system permission to execute gradle tasks
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Advanced Gradle setup handles automatic caching of your dependencies
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        build-scan-publish: false

    # Safe network dependency resolving loop
    - name: Resolve dependencies
      run: |
        max_attempts=3
        attempt=1
        until ./gradlew dependencies --stacktrace; do
          if [ $attempt -ge $max_attempts ]; then
            echo "Failed to resolve dependencies after $max_attempts attempts"
            exit 1
          fi
          echo "Attempt $attempt failed, retrying in 30 seconds..."
          attempt=$((attempt + 1))
          sleep 30
        done

    # Compiles and builds your Minecraft Mod file
    - name: Build Mod
      run: ./gradlew build --stacktrace

    # Saves your built mod .jar so you can download it from GitHub Actions
    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Minecraft-Mod
        path: build/libs/*.jar
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Java 25
      uses: actions/setup-java@v5
      with:
        java-version: "25"
        distribution: "microsoft"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        build-scan-publish: true
        build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
        build-scan-terms-of-use-agree: "yes"
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
        cache-read-only: ${{ github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/heads/1.') }}

    - name: Resolve dependencies
      run: |
        max_attempts=3
        attempt=1
        until ./gradlew dependencies --stacktrace; do
          if [ $attempt -ge $max_attempts ]; then
            echo "Failed to resolve dependencies after $max_attempts attempts"
            exit 1
          fi
          echo "Attempt $attempt failed, retrying in 30 seconds..."
          attempt=$((attempt + 1))
          sleep 30
        done

    - name: Build
      run: ./gradlew build --stacktrace --warning-mode=fail

    - name: Upload to VirusTotal for analysis
      id: virustotal
      env:
        VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
      if: ${{ env.VIRUSTOTAL_API_KEY }}
      uses: crazy-max/ghaction-virustotal@v5
      with:
        vt_api_key: ${{ env.VIRUSTOTAL_API_KEY }}
        files: |
          ./build/libs/*.jar
      # An error in this step means that the upload failed, not that a false
      # positive was detected.
      continue-on-error: true

    - name: Add VirusTotal links to build summary
      if: ${{ steps.virustotal.outputs.analysis }}
      run: |
        echo "<details open>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>🛡️ VirusTotal Scans</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        IFS=',' read -ra ANALYSIS <<< "${{ steps.virustotal.outputs.analysis }}"
        for i in "${ANALYSIS[@]}"; do
          filepath=${i%%=*}
          url=${i#*=}
          filename=$(basename "$filepath")
          echo "- [$filename]($url)" >> $GITHUB_STEP_SUMMARY
        done
        echo "</details>" >> $GITHUB_STEP_SUMMARY

    - name: Install Mesa Vulkan drivers
      run: sudo apt-get install -y mesa-vulkan-drivers

    - name: Run client gametests
      timeout-minutes: 10
      env:
        IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
      run: ./gradlew runClientGameTest --stacktrace --warning-mode=fail

    - name: Run client gametests with mods
      timeout-minutes: 10
      env:
        IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
      run: ./gradlew runClientGameTestWithMods --stacktrace --warning-mode=fail

    - name: Upload screenshots
      uses: actions/upload-artifact@v7
      if: ${{ success() || failure() }}
      with:
        name: screenshots
        path: build/run/*/screenshots
        compression-level: 0

    - name: Upload logs
      uses: actions/upload-artifact@v7
      if: ${{ success() || failure() }}
      with:
        name: logs
        path: build/run/*/logs/latest.log

    - name: Upload crash reports
      uses: actions/upload-artifact@v7
      if: ${{ failure() }}
      with:
        name: crash-reports
        path: build/run/*/crash-reports

    - name: Process [release] marker
      if: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[release]') && !contains(github.ref_name, '/') && github.ref_name != 'master' }}
      env:
        GH_TOKEN: ${{ secrets.WIMODS_NET_PUBLISH_TOKEN }}
      run: |
        mc_version=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d ' \r')
        gh workflow run publish_snapshot_ports.yml \
          --repo Wurst-Imperium/wimods.net \
          --ref master \
          -f mc_version="$mc_version" \
          -f mods="wurst"
